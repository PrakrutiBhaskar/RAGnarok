# RAG Debugger — Sample Pipeline Config
# Use this as a template for your own pipeline.

name: "Customer Support RAG Pipeline"
description: "Diagnose retrieval and generation failures in support ticket QA pipeline"
tags: ["support", "production", "v2"]

# Vector database configuration
vector_db:
  provider: chroma
  collection_name: support_docs
  host: localhost
  port: 8000

# Embedding model
embedding:
  provider: openai
  model_id: text-embedding-3-small

# LLM for generation diagnostics
llm:
  provider: openai
  model_id: gpt-4o-mini
  temperature: 0.0
  max_tokens: 512

# Chunking (used by BM25 oracle indexer)
chunking:
  strategy: recursive
  chunk_size: 512
  chunk_overlap: 64

# Retrieval settings
retrieval:
  top_k: 5
  search_type: similarity

# Prompt template (required for generation diagnostics)
prompt:
  template: |
    You are a helpful customer support assistant.
    Answer the question using ONLY the context below.
    If the answer is not in the context, say "I cannot find this information."

    Context:
    {context}

    Question: {question}

    Answer:
  context_key: context
  question_key: question
